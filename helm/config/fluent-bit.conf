# Fluent Bit configuration, rendered through Helm `tpl` from the chart ConfigMap
# (mirroring how nginx.conf / log_format.conf are shipped).
#
# Access-log forwarding pipeline: nginx ships its JSON access log here over syslog UDP on
# loopback (best-effort); Fluent Bit filters it down to the selected status codes and
# forwards only those to central Alloy over OTLP. Everything else is dropped at the source.
#
# Metrics pipeline (fluentbit.accessLog.metrics): derive Prometheus metrics from the same
# stream, merge with the scraped nginx exporter, and serve one /metrics endpoint.

[SERVICE]
    flush        1
    daemon       off
    log_level    info
    parsers_file parsers.conf

# nginx `access_log syslog:server=127.0.0.1:<port>` delivers the JSON `main` format here.
[INPUT]
    Name              syslog
    Tag               nginx.access
    Mode              udp
    Listen            127.0.0.1
    Port              {{ .Values.fluentbit.accessLog.syslogPort }}
    Buffer_Chunk_Size 32k
    Buffer_Max_Size   64k
{{ if .Values.fluentbit.accessLog.metrics.enabled }}
# Fluent Bit's own metrics (records/bytes in and out, retries, uptime) — a rough signal for
# sizing the sidecar (compare input records against nginx's request count).
[INPUT]
    Name            fluentbit_metrics
    Tag             nginx.metrics.fluentbit
    Scrape_Interval 30
{{ if .Values.fluentbit.accessLog.metrics.scrapeExporter }}
# Scrape the existing nginx-prometheus-exporter so its stub_status gauges merge into the
# single /metrics endpoint below (Port = the exporter's own mclabels.prometheus.port).
[INPUT]
    Name         prometheus_scrape
    Tag          nginx.metrics.exporter
    Host         127.0.0.1
    Port         {{ .Values.mclabels.prometheus.port }}
    Metrics_Path /metrics
{{ end }}
{{- end }}
# The syslog message body is the nginx JSON line; decode it so the OTel-shaped fields
# (including the nested http.response.status_code) become queryable by the grep filter.
[FILTER]
    Name         parser
    Match        nginx.access
    Key_Name     message
    Parser       json
    Reserve_Data On
{{ if .Values.fluentbit.accessLog.metrics.enabled }}
# Derive metrics from the full stream, before grep drops the non-forwarded records, so the
# counters cover every request. Raw, overridable fluentbit.accessLog.metrics.config (tpl).
{{ tpl .Values.fluentbit.accessLog.metrics.config . -}}
{{ end }}
# Keep only the status codes selected by fluentbit.accessLog.forward; drop everything else.
# When no forwarding rule is active the regex matches nothing, so all records are dropped.
[FILTER]
    Name  grep
    Match nginx.access
    Regex $Attributes['http.response.status_code'] {{ include "nginx.fluentbit.accessLogRegex" . }}

# Forward the surviving records to the dedicated central Alloy OTLP/HTTP logs endpoint
# (fluentbit.output.logs.*, deliberately NOT the traces-only opentelemetry.exporterHost).
[OUTPUT]
    Name     opentelemetry
    Match    nginx.access
    Host     {{ .Values.fluentbit.output.logs.host }}
    Port     {{ .Values.fluentbit.output.logs.port }}
    Logs_uri /v1/logs
    {{- if eq .Values.fluentbit.output.logs.protocol "https" }}
    Tls      On
    {{- end }}
{{- if .Values.fluentbit.accessLog.metrics.enabled }}

# Serve the merged /metrics (log-derived + scraped exporter + Fluent Bit's own) on
# metrics.port. Match * is safe — prometheus_exporter only handles metric events, not logs.
[OUTPUT]
    Name  prometheus_exporter
    Match *
    Host  0.0.0.0
    Port  {{ .Values.fluentbit.accessLog.metrics.port }}
{{- end }}
